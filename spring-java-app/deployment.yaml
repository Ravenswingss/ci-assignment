apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-java-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-java-app
  template:
    metadata:
      labels:
        app: spring-java-app
    spec:
      containers:
      - name: spring-java-app
        image: skulldrag/spring-java-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: spring-java-app-service
spec:
  type: NodePort
  selector:
    app: spring-java-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30081
